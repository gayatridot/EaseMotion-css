name: 🤖 Anti-Bot & AI-Slop Detector

# ─────────────────────────────────────────────────────────────────────────────
# Detects automated cron-bot and AI-slop exploitation patterns on both
# issues and PRs. Auto-tags them as gssoc:invalid + ai-slop so the repo
# owner still gets contribution points from merges, but exploiters get
# NO GSSoC leaderboard credit.
#
# Detection patterns:
#  1. "auto-created by cron" / "auto generated by cron" in issue/PR body
#  2. "generated for easemotion-css competition" in CSS/README files
#  3. "for ci bypass" / "ci bypass" in PR body (explicit bypass attempt)
#  4. "generated:" date stamp in CSS files
#  5. Known bot-operator suffixes in folder names (e.g. -tm, patterns)
#  6. Zero-file PRs submitted by high-velocity accounts
# ─────────────────────────────────────────────────────────────────────────────

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  anti-bot-detector:
    name: Anti-Bot & AI-Slop Detector
    runs-on: ubuntu-latest
    steps:
      - name: Detect AI Slop / Cron Bot / CI Bypass patterns
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const isPR = !!context.payload.pull_request;
            const isIssue = !!context.payload.issue;

            const item = isPR ? context.payload.pull_request : context.payload.issue;
            if (!item) return;

            const issueNumber = item.number;
            const author = item.user.login;
            const title  = (item.title || '').toLowerCase();
            const body   = (item.body  || '').toLowerCase();

            // ── Known bot-operator accounts (add as identified) ───────────────
            const KNOWN_BOT_ACCOUNTS = [
              'tmdeveloper007',
              'desireddymohithreddy0925',
            ];

            // ── Cron/bot/AI-slop signatures in issue or PR body ───────────────
            const BODY_SIGNATURES = [
              'auto-created by cron',
              'auto generated by cron',
              'generated by cron',
              'auto-created by bot',
              'created by bot',
              'created by script',
              'generated by script',
              'auto created by',
              'generated for easemotion-css competition',
              'for ci bypass',
              'ci bypass',
              'submitted via submissions/examples/ for ci bypass',
              'submitted for ci bypass',
              'bypass the ci',
            ];

            // ── Check if author is a known bot account ────────────────────────
            const isKnownBot = KNOWN_BOT_ACCOUNTS.includes(author);

            // ── Check body for bot/slop signatures ───────────────────────────
            const matchedSig = BODY_SIGNATURES.find(sig => body.includes(sig));

            // ── Check PR files for "Generated:" comment pattern (AI CSS) ─────
            let hasGeneratedComment = false;
            let hasCIBypassInFiles = false;
            if (isPR) {
              try {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  pull_number: issueNumber,
                });

                for (const file of files) {
                  const patch = (file.patch || '').toLowerCase();
                  if (patch.includes('generated for easemotion-css competition') ||
                      patch.includes('generated:') ||
                      patch.includes('auto-generated') ||
                      patch.includes('auto generated')) {
                    hasGeneratedComment = true;
                  }
                  if (patch.includes('ci bypass') || patch.includes('for ci bypass')) {
                    hasCIBypassInFiles = true;
                  }
                }
              } catch(e) {
                console.log('Could not fetch PR files:', e.message);
              }
            }

            const isSlopDetected = isKnownBot || !!matchedSig || hasGeneratedComment || hasCIBypassInFiles;

            if (!isSlopDetected) {
              console.log(`✅ #${issueNumber} by @${author} — no bot/slop patterns detected.`);
              return;
            }

            // ── Log what triggered detection ──────────────────────────────────
            console.log(`🚨 BOT/SLOP DETECTED on #${issueNumber} by @${author}`);
            if (isKnownBot)          console.log(`   Reason: Known bot account`);
            if (matchedSig)          console.log(`   Reason: Body contains "${matchedSig}"`);
            if (hasGeneratedComment) console.log(`   Reason: CSS/file contains AI-generation comment`);
            if (hasCIBypassInFiles)  console.log(`   Reason: Explicit CI bypass mentioned in files`);

            // ── Apply ai-slop + gssoc:invalid labels ──────────────────────────
            try {
              // Ensure labels exist first
              for (const label of ['ai-slop', 'gssoc:invalid']) {
                try {
                  await github.rest.issues.getLabel({
                    owner: context.repo.owner, repo: context.repo.repo, name: label
                  });
                } catch(e) {
                  // Create label if missing
                  const colors = { 'ai-slop': 'FF0000', 'gssoc:invalid': 'B60205' };
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner, repo: context.repo.repo,
                    name: label, color: colors[label] || 'FF0000',
                    description: label === 'ai-slop'
                      ? 'AI-generated / cron-bot submission — not eligible for GSSoC points'
                      : 'Invalid GSSoC submission'
                  });
                }
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issueNumber,
                labels: ['ai-slop', 'gssoc:invalid'],
              });

              // Remove approval labels so no GSSoC points are earned
              for (const label of ['gssoc:approved', 'accepted', 'integrated', 'maintainer-approved']) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    issue_number: issueNumber,
                    name: label,
                  });
                } catch(e) {}
              }
            } catch(e) {
              console.log('Label error:', e.message);
            }

            console.log(`✅ Applied ai-slop + gssoc:invalid to #${issueNumber} by @${author}`);
